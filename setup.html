<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power SMS - Setup</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="/public/css/style.css">
</head>
<body style="min-height:100vh;background:linear-gradient(135deg,#4a1f8c 0%,#6f42c1 60%,#9b59b6 100%);display:flex;align-items:center;justify-content:center;padding:20px;">
<div class="tc" id="tc"></div>
<div class="bubbles"><div class="bubble b1"></div><div class="bubble b3"></div><div class="bubble b5"></div></div>
<div class="aw"><div class="ac">
  <div class="bb-box"><div class="bb-icon">⚡</div><div class="bb-name">Power <em>SMS</em></div></div>
  <div style="text-align:center;margin-bottom:14px;"><span style="background:#f0ecff;color:var(--p);border-radius:20px;padding:4px 14px;font-size:11.5px;font-weight:700;"><i class="bi bi-gear-fill me-1"></i>First Time Setup</span></div>
  <div class="infob mb-3"><strong>Create Super Admin Account</strong><br>This is done only once.</div>
  <div id="smsg"></div>
  <div class="mbf"><label class="fl">Username *</label><input type="text" id="su" class="fc" placeholder="admin"></div>
  <div class="mbf"><label class="fl">Password *</label><input type="password" id="sp" class="fc" placeholder="Strong password"></div>
  <div class="mbf"><label class="fl">Confirm Password *</label><input type="password" id="sp2" class="fc" placeholder="Repeat password"></div>
  <button class="btn-auth" id="sbtn" onclick="doSetup()"><i class="bi bi-person-plus me-2"></i>Create Super Admin</button>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/public/js/setup.js"></script>
</body></html>
