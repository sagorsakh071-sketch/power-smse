<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power SMS - Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body style="min-height:100vh;background:linear-gradient(135deg,#4a1f8c 0%,#6f42c1 60%,#9b59b6 100%);display:flex;align-items:center;justify-content:center;padding:20px;">
<div class="tc" id="tc"></div>
<div class="bubbles"><div class="bubble b2"></div><div class="bubble b4"></div></div>
<div class="aw"><div class="ac">
  <div class="bb-box"><div class="bb-icon">⚡</div><div class="bb-name">Power <em>SMS</em></div></div>
  <div style="text-align:center;margin-bottom:14px;"><span id="reg-role-badge" style="background:#d1fae5;color:#065f46;border-radius:20px;padding:4px 14px;font-size:11.5px;font-weight:700;"><i class="bi bi-person-plus-fill me-1"></i>Agent Registration</span></div>
  <div id="rmsg"></div>
  <div id="rform">
    <div class="mbf"><label class="fl">Username *</label><input type="text" id="ru" class="fc" placeholder="Username"></div>
    <div class="mbf"><label class="fl">Full Name</label><input type="text" id="rn" class="fc" placeholder="Your name"></div>
    <div class="mbf"><label class="fl">Password *</label><input type="password" id="rp" class="fc" placeholder="Password"></div>
    <div class="mbf"><label class="fl">Confirm Password *</label><input type="password" id="rp2" class="fc" placeholder="Repeat password"></div>
    <button class="btn-auth" id="rbtn" onclick="doRegister()"><i class="bi bi-person-check me-2"></i>Create Account</button>
  </div>
  <div class="afoot"><span style="color:rgba(111,66,193,.6);cursor:pointer;" onclick="window.location.href='/login'">← Back to Login</span></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/register.js"></script>
</body></html>
